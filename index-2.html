    /* CTA button */
    .cta-btn {

    .hero2-section {

      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;

    .hero2-video {

      height: auto;
      mix-blend-mode: screen;

      pointer-events: none;

      -webkit-mask-image: linear-gradient(to bottom,

      mask-image: linear-gradient(to bottom,
        black 0%, black 30%, rgba(0,0,0,0.6) 50%, transparent 68%);

    .hero2-content {

      align-items: center;
      text-align: center;
      padding: 0 2rem 5rem;
      margin-top: 0;
      max-width: 80vw;
      isolation: isolate;
    }
    /* Gradient glass backdrop:
       - transparent above content (0 → 60px)
       - 20px fade in at eyebrow: 60px → 80px  (80px = 5rem top inset)
       - 100% opaque through entire content area
       - 20px fade out at container bottom: calc(100%-100px) → calc(100%-80px)

    /* Backdrop handled by absolute div in Hero JSX — covers full section height */

          rgba(12,16,28,0.5) 50%,
          rgba(10,14,24,0.45) 75%,
          rgba(6,8,16,0.55) 100%

      border: 1px solid rgba(232,184,42,0.1);
      border-radius: 1px;
      padding: 2.6rem 2.4rem 2.8rem;
      margin: 0.5rem;

        inset 0 1px 0 rgba(232,184,42,0.08),

      inset: 0;

        transparent 0%,
        transparent 35%,
        rgba(255,255,255,0.15) 50%,

      background-position: 200% center;
      pointer-events: none;
      opacity: 0;
      z-index: 20;

      opacity: 1;
      animation: shinySlide2 1.5s ease forwards;

      100% { background-position: -100% center; }

    /* Top rod — 30% bigger: 7px → 9px, overhang -10px → -13px */

      position: absolute;
      top: -6px; left: -13px; right: -13px;
      height: 9px;

        #06101e 15%,
        #0a1828 35%,
        #0e2038 50%,
        #0a1828 65%,
        #06101e 85%,

        0 2px 10px rgba(0,0,0,0.85),
        inset 0 1px 0 rgba(63,177,255,0.16),
        0 0 14px rgba(63,177,255,0.06);

        #06101e 15%,

  <script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ---- Intersection Observer ----------------------------------- */
function useFadeInView(threshold = 0.06) {
  const ref = useRef(null);
  const [isVisible, setIsVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const observer = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setIsVisible(true); observer.unobserve(entry.target); } },
      { threshold }
    );
    observer.observe(el);
    return () => observer.disconnect();
  }, []);
  return [ref, isVisible];
}

function MistReveal({ children, delay = 0, className = '' }) {
  const [ref, isVisible] = useFadeInView();
  return (
    <div
      ref={ref}
      className={`mist-reveal${isVisible ? ' in-view' : ''} ${className}`}
      style={{ transitionDelay: `${delay}ms` }}
    >
      {children}
    </div>
  );
}

function WukongDivider({ glyph = '✦' }) {
  return (
    <div className="wukong-divider">
      <span className="wukong-divider-glyph">{glyph}</span>
    </div>
  );
}

/* ---- Nav ----------------------------------------------------- */
function Nav() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 56);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <nav
      className={`fixed top-0 left-0 right-0 z-50 transition-all duration-700 ${scrolled ? 'nav-scrolled' : ''}`}
      style={{ paddingTop: scrolled ? '1rem' : '2rem', paddingBottom: scrolled ? '1rem' : '2rem' }}
    >
      <div className="grid grid-cols-12 px-6">
        <div className="col-start-2 col-span-10 flex items-center justify-between">
          <a href="#" style={{ textDecoration: 'none' }}>
            <span style={{
              fontSize: '0.72rem', letterSpacing: '0.24em', textTransform: 'uppercase',
              color: 'rgba(255,255,255,0.62)', fontWeight: 300, transition: 'color 0.4s',
            }}
              onMouseEnter={e => e.currentTarget.style.color = 'rgba(255,255,255,0.9)'}
              onMouseLeave={e => e.currentTarget.style.color = 'rgba(255,255,255,0.62)'}
            >
              KiwiDesigns
            </span>
          </a>
          <div className="flex items-center gap-8">
            <a href="#about" className="nav-link">About</a>
            <a href="#work"  className="nav-link">Work</a>
            <a href="#work"  className="cta-btn" style={{ padding: '0.52rem 1.3rem', marginLeft: '0.5rem' }}>
              View Work
            </a>
          </div>
        </div>
      </div>
    </nav>
  );
}

/* ---- Hero ---------------------------------------------------- */

          - 20px above eyebrow → eyebrow: transitions from 80% to 100%
          - eyebrow → near bottom: 100% opaque glass
          - bottom edge: 50px soft fade out */}
      <div aria-hidden="true" style={{
        position: 'absolute',
        inset: 0,
        background: 'rgba(10,12,16,0.9)',
        backdropFilter: 'blur(18px)',
        WebkitBackdropFilter: 'blur(18px)',
        WebkitMaskImage: `linear-gradient(to bottom,
          rgba(0,0,0,0.8)  0px,
          rgba(0,0,0,0.8)  calc(38vh - 150px),
          rgba(0,0,0,0.83) calc(38vh - 120px),
          rgba(0,0,0,0.87) calc(38vh - 90px),
          rgba(0,0,0,0.91) calc(38vh - 55px),
          rgba(0,0,0,0.96) calc(38vh - 20px),
          black            calc(38vh),
          black            calc(100% - 50px),
          transparent      100%)`,
        maskImage: `linear-gradient(to bottom,
          rgba(0,0,0,0.8)  0px,
          rgba(0,0,0,0.8)  calc(38vh - 150px),
          rgba(0,0,0,0.83) calc(38vh - 120px),
          rgba(0,0,0,0.87) calc(38vh - 90px),
          rgba(0,0,0,0.91) calc(38vh - 55px),
          rgba(0,0,0,0.96) calc(38vh - 20px),
          black            calc(38vh),
          black            calc(100% - 50px),
          transparent      100%)`,
        zIndex: 1,
        pointerEvents: 'none',
      }} />

      {/* Video — absolute, 50vw wide, top half visible, stays on last frame */}
      <video
        className="hero2-video"
        src="images/Video.mp4"
        autoPlay
        muted
        playsInline
        onEnded={e => e.target.pause()}
        aria-hidden="true"
      />

      {/* Centered text content — paddingTop pushes it to the video fade zone */}
      <div className="hero2-content" style={{ paddingTop: '38vh' }}>

        <MistReveal delay={60}>
          <p className="eyebrow mb-6">Portfolio — 2024</p>
        </MistReveal>

        <MistReveal delay={160}>
          <h1 className="font-bold" style={{
            fontSize: 'clamp(3.2rem, 8vw, 7rem)',
            letterSpacing: '-0.055em',
            lineHeight: '0.93',
            marginBottom: '2rem',
            color: '#ffffff',
            textAlign: 'center',
          }}>
            Architecting
            <br />
            <span style={{ color: 'rgba(255,255,255,0.28)' }}>Digital</span>
            <br />
            Citadels
          </h1>
        </MistReveal>

        <MistReveal delay={300}>
          <p className="text-slate-400 mb-10" style={{ lineHeight: '1.8', maxWidth: '480px', fontSize: '1rem', textAlign: 'center' }}>

              onMouseLeave={e => e.currentTarget.style.color = 'rgba(255,255,255,0.38)'}
            >
              About
            </a>
          </div>
        </MistReveal>

      </div>
    </section>
  );
}

/* ---- Shine Card — runs shine once per hover, prevents re-run ---- */
function ShineCard({ children }) {
  const runningRef = React.useRef(false);
  const [shining, setShining] = React.useState(false);
  const handleEnter = () => {
    if (runningRef.current) return;
    runningRef.current = true;
    setShining(true);
    setTimeout(() => { setShining(false); runningRef.current = false; }, 1500);
  };
  return (
    <div className={`scroll-card${shining ? ' shine-active' : ''}`} onMouseEnter={handleEnter}>
      <div className="shine-overlay" />
      {children}
    </div>
  );
}

/* ---- Expertise Card — plain glass, no rods ------------------- */

    if (runningRef.current) return;
    runningRef.current = true;
    setShining(true);
    setTimeout(() => { setShining(false); runningRef.current = false; }, 1500);

<script>
/* ── WebGL Fluid Simulation (Lusion-style cursor effect, dark mode) ── */
(function () {
  'use strict';
  const canvas = document.getElementById('fluid-canvas');
  const gl = canvas.getContext('webgl', {
    alpha: true, depth: false, stencil: false,
    antialias: false, preserveDrawingBuffer: false, premultipliedAlpha: false,
  });
  if (!gl) return;
  const hfExt = gl.getExtension('OES_texture_half_float');
  if (!hfExt) return;
  gl.getExtension('OES_texture_half_float_linear');
  const HALF = hfExt.HALF_FLOAT_OES;

  // Config
  const SIM=128, DYE=256, VD=0.95, DD=0.93, PI=20, CL=12, SR=0.0014, SF=1200;

  const VS=`precision highp float;
    attribute vec2 aPos;varying vec2 vUv,vL,vR,vT,vB;uniform vec2 texel;
    void main(){vUv=aPos*.5+.5;
      vL=vUv-vec2(texel.x,0.);vR=vUv+vec2(texel.x,0.);
      vT=vUv+vec2(0.,texel.y);vB=vUv-vec2(0.,texel.y);
      gl_Position=vec4(aPos,0.,1.);}`;

  const ADV=`precision highp float;precision highp sampler2D;
    varying vec2 vUv;uniform sampler2D uVel,uSrc;
    uniform vec2 texel,dyeTexel;uniform float dt,diss;
    vec4 bl(sampler2D t,vec2 uv,vec2 ts){
      vec2 st=uv/ts-.5;vec2 i=floor(st),f=fract(st);
      vec4 a=texture2D(t,(i+vec2(.5,.5))*ts),b=texture2D(t,(i+vec2(1.5,.5))*ts),
           c=texture2D(t,(i+vec2(.5,1.5))*ts),d=texture2D(t,(i+vec2(1.5,1.5))*ts);
      return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);}
    void main(){vec2 c=vUv-dt*bl(uVel,vUv,texel).xy*texel;
      gl_FragColor=diss*bl(uSrc,c,dyeTexel);gl_FragColor.a=1.;}`;

  const CURL_S=`precision mediump float;precision mediump sampler2D;
    varying vec2 vUv,vL,vR,vT,vB;uniform sampler2D uVel;
    void main(){float L=texture2D(uVel,vL).y,R=texture2D(uVel,vR).y,
      T=texture2D(uVel,vT).x,B=texture2D(uVel,vB).x;
      gl_FragColor=vec4(.5*(R-L-T+B),0.,0.,1.);}`;

  const VORT_S=`precision highp float;precision highp sampler2D;
    varying vec2 vUv,vL,vR,vT,vB;uniform sampler2D uVel,uCurl;uniform float curl,dt;
    void main(){float L=texture2D(uCurl,vL).x,R=texture2D(uCurl,vR).x,
      T=texture2D(uCurl,vT).x,B=texture2D(uCurl,vB).x,C=texture2D(uCurl,vUv).x;
      vec2 f=.5*vec2(abs(T)-abs(B),abs(R)-abs(L));
      f/=length(f)+.0001;f*=curl*C;f.y*=-1.;
      vec2 v=clamp(texture2D(uVel,vUv).xy+f*dt,-1000.,1000.);
      gl_FragColor=vec4(v,0.,1.);}`;

  const DIVG_S=`precision mediump float;precision mediump sampler2D;
    varying vec2 vUv,vL,vR,vT,vB;uniform sampler2D uVel;
    void main(){float L=texture2D(uVel,vL).x,R=texture2D(uVel,vR).x,
      T=texture2D(uVel,vT).y,B=texture2D(uVel,vB).y;
      gl_FragColor=vec4(.5*(R-L+T-B),0.,0.,1.);}`;

  const PRES_S=`precision mediump float;precision mediump sampler2D;
    varying vec2 vUv,vL,vR,vT,vB;uniform sampler2D uPres,uDiv;
    void main(){float L=texture2D(uPres,vL).x,R=texture2D(uPres,vR).x,
      T=texture2D(uPres,vT).x,B=texture2D(uPres,vB).x,C=texture2D(uDiv,vUv).x;
      gl_FragColor=vec4((L+R+B+T-C)*.25,0.,0.,1.);}`;

  const GRAD_S=`precision mediump float;precision mediump sampler2D;
    varying vec2 vUv,vL,vR,vT,vB;uniform sampler2D uPres,uVel;
    void main(){float L=texture2D(uPres,vL).x,R=texture2D(uPres,vR).x,
      T=texture2D(uPres,vT).x,B=texture2D(uPres,vB).x;
      vec2 v=texture2D(uVel,vUv).xy-vec2(R-L,T-B);
      gl_FragColor=vec4(v,0.,1.);}`;

  const SPLAT_S=`precision highp float;precision highp sampler2D;
    varying vec2 vUv;uniform sampler2D uTgt;
    uniform float aspect,radius;uniform vec3 color;uniform vec2 pt;
    void main(){vec2 p=vUv-pt;p.x*=aspect;
      vec3 sp=exp(-dot(p,p)/radius)*color;
      gl_FragColor=vec4(texture2D(uTgt,vUv).xyz+sp,1.);}`;

  const DISP_S=`precision highp float;precision highp sampler2D;
    varying vec2 vUv;uniform sampler2D uTex;
    void main(){vec3 C=texture2D(uTex,vUv).rgb;
      float a=max(C.r,max(C.g,C.b));
      gl_FragColor=vec4(C,a*.88);}`;

  function mkP(fs){
    const p=gl.createProgram();
    [[VS,gl.VERTEX_SHADER],[fs,gl.FRAGMENT_SHADER]].forEach(([src,type])=>{
      const s=gl.createShader(type);
      gl.shaderSource(s,src);gl.compileShader(s);gl.attachShader(p,s);
    });
    gl.bindAttribLocation(p,0,'aPos');
    gl.linkProgram(p);
    const u={};
    for(let i=gl.getProgramParameter(p,gl.ACTIVE_UNIFORMS)-1;i>=0;i--){
      const n=gl.getActiveUniform(p,i).name;u[n]=gl.getUniformLocation(p,n);
    }
    return{p,u};
  }

  const pA=mkP(ADV),pC=mkP(CURL_S),pVo=mkP(VORT_S),pDi=mkP(DIVG_S);
  const pPr=mkP(PRES_S),pGr=mkP(GRAD_S),pSp=mkP(SPLAT_S),pDs=mkP(DISP_S);

  const qb=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,qb);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,-1,1,1,1,1,-1]),gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);
  gl.clearColor(0,0,0,0);

  function mkFBO(w,h,filter){
    const tex=gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D,tex);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,filter);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,filter);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,HALF,null);
    const fb=gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER,fb);
    gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);
    gl.viewport(0,0,w,h);gl.clear(gl.COLOR_BUFFER_BIT);
    return{fb,tex,w,h,texel:[1/w,1/h],
      bind(i){gl.activeTexture(gl.TEXTURE0+i);gl.bindTexture(gl.TEXTURE_2D,tex);return i;}};
  }

  function mkDB(w,h,filter){
    let a=mkFBO(w,h,filter),b=mkFBO(w,h,filter);
    return{texel:[1/w,1/h],
      get read(){return a;},get write(){return b;},swap(){[a,b]=[b,a];}};
  }

  function blit(t){
    if(t){gl.bindFramebuffer(gl.FRAMEBUFFER,t.fb);gl.viewport(0,0,t.w,t.h);}
    else{gl.bindFramebuffer(gl.FRAMEBUFFER,null);gl.viewport(0,0,canvas.width,canvas.height);}
    gl.drawArrays(gl.TRIANGLE_FAN,0,4);
  }

  const vel=mkDB(SIM,SIM,gl.LINEAR),dye=mkDB(DYE,DYE,gl.LINEAR);
  const pres=mkDB(SIM,SIM,gl.NEAREST),curlFBO=mkFBO(SIM,SIM,gl.NEAREST),divFBO=mkFBO(SIM,SIM,gl.NEAREST);

  function step(dt){
    gl.disable(gl.BLEND);
    // Curl
    gl.useProgram(pC.p);gl.uniform2fv(pC.u.texel,vel.texel);
    vel.read.bind(0);gl.uniform1i(pC.u.uVel,0);blit(curlFBO);
    // Vorticity
    gl.useProgram(pVo.p);gl.uniform2fv(pVo.u.texel,vel.texel);
    vel.read.bind(0);gl.uniform1i(pVo.u.uVel,0);
    curlFBO.bind(1);gl.uniform1i(pVo.u.uCurl,1);
    gl.uniform1f(pVo.u.curl,CL);gl.uniform1f(pVo.u.dt,dt);
    blit(vel.write);vel.swap();
    // Divergence
    gl.useProgram(pDi.p);gl.uniform2fv(pDi.u.texel,vel.texel);
    vel.read.bind(0);gl.uniform1i(pDi.u.uVel,0);blit(divFBO);
    // Pressure
    gl.useProgram(pPr.p);gl.uniform2fv(pPr.u.texel,pres.texel);
    divFBO.bind(1);gl.uniform1i(pPr.u.uDiv,1);
    for(let i=0;i<PI;i++){pres.read.bind(0);gl.uniform1i(pPr.u.uPres,0);blit(pres.write);pres.swap();}
    // Gradient subtract
    gl.useProgram(pGr.p);gl.uniform2fv(pGr.u.texel,vel.texel);
    pres.read.bind(0);gl.uniform1i(pGr.u.uPres,0);
    vel.read.bind(1);gl.uniform1i(pGr.u.uVel,1);
    blit(vel.write);vel.swap();
    // Advect velocity
    gl.useProgram(pA.p);
    gl.uniform2fv(pA.u.texel,vel.texel);gl.uniform2fv(pA.u.dyeTexel,vel.texel);
    vel.read.bind(0);gl.uniform1i(pA.u.uVel,0);
    vel.read.bind(1);gl.uniform1i(pA.u.uSrc,1);
    gl.uniform1f(pA.u.dt,dt);gl.uniform1f(pA.u.diss,VD);
    blit(vel.write);vel.swap();
    // Advect dye
    gl.uniform2fv(pA.u.texel,vel.texel);gl.uniform2fv(pA.u.dyeTexel,dye.texel);
    vel.read.bind(0);gl.uniform1i(pA.u.uVel,0);
    dye.read.bind(1);gl.uniform1i(pA.u.uSrc,1);
    gl.uniform1f(pA.u.dt,dt);gl.uniform1f(pA.u.diss,DD);
    blit(dye.write);dye.swap();
  }

  function splat(x,y,dx,dy,col){
    const asp=canvas.width/canvas.height;
    gl.useProgram(pSp.p);
    gl.uniform1f(pSp.u.aspect,asp);
    gl.uniform2f(pSp.u.pt,x/canvas.width,1.0-y/canvas.height);
    gl.uniform1f(pSp.u.radius,SR);
    vel.read.bind(0);gl.uniform1i(pSp.u.uTgt,0);
    gl.uniform3f(pSp.u.color,dx*SF,-dy*SF,0);
    blit(vel.write);vel.swap();
    dye.read.bind(0);
    gl.uniform3f(pSp.u.color,col[0],col[1],col[2]);
    blit(dye.write);dye.swap();
  }

  // HSV→RGB cycling through site palette (cyan/gold/blue)
  let hue=0.55;
  function nextColor(){
    hue=(hue+0.07)%1.0;
    const h=hue*6,i=Math.floor(h),f=h-i;
    const p2=0.2,q=1-0.8*f,t2=0.2+0.8*f;
    const m=[[1,t2,p2],[q,1,p2],[p2,1,t2],[p2,q,1],[t2,p2,1],[1,p2,q]][i];
    return m.map(v=>v*0.38);
  }

  const ptr={x:0,y:0,dx:0,dy:0,active:false,color:nextColor()};
  let colorStep=0;
  document.addEventListener('mousemove',e=>{
    ptr.dx+=e.clientX-ptr.x; ptr.dy+=e.clientY-ptr.y;
    ptr.x=e.clientX; ptr.y=e.clientY; ptr.active=true;
  },{passive:true});

  function syncSize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  syncSize();
  window.addEventListener('resize',syncSize);

  let last=performance.now();
  function loop(now){
    const dt=Math.min((now-last)/1000,0.016);last=now;
    if(ptr.active){
      const len=Math.sqrt(ptr.dx*ptr.dx+ptr.dy*ptr.dy);
      if(len>0.5){
        // Normalize to unit vector — constant force regardless of cursor speed
        splat(ptr.x,ptr.y,(ptr.dx/len)*18,(ptr.dy/len)*18,ptr.color);
      }
      ptr.dx=0;ptr.dy=0;ptr.active=false;
      if(++colorStep%6===0)ptr.color=nextColor();
    }
    step(dt);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
    gl.bindFramebuffer(gl.FRAMEBUFFER,null);
    gl.viewport(0,0,canvas.width,canvas.height);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.useProgram(pDs.p);
    dye.read.bind(0);gl.uniform1i(pDs.u.uTex,0);
    gl.drawArrays(gl.TRIANGLE_FAN,0,4);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>

</body>
