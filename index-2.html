      margin-top: 0;
      max-width: 80vw;

    /* Gradient glass backdrop:
       - transparent above content (0 → 60px)
       - 20px fade in at eyebrow: 60px → 80px  (80px = 5rem top inset)
       - 100% opaque through entire content area
       - 20px fade out at container bottom: calc(100%-100px) → calc(100%-80px)

    /* Backdrop handled by absolute div in Hero JSX — covers full section height */

      border-radius: 1px;

        #0e2038 50%,

        inset 0 1px 0 rgba(63,177,255,0.16),

  <script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ---- Intersection Observer ----------------------------------- */
function useFadeInView(threshold = 0.06) {
  const ref = useRef(null);
  const [isVisible, setIsVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const observer = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setIsVisible(true); observer.unobserve(entry.target); } },
      { threshold }
    );
    observer.observe(el);
    return () => observer.disconnect();
  }, []);
  return [ref, isVisible];
}

function MistReveal({ children, delay = 0, className = '' }) {
  const [ref, isVisible] = useFadeInView();
  return (
    <div
      ref={ref}
      className={`mist-reveal${isVisible ? ' in-view' : ''} ${className}`}
      style={{ transitionDelay: `${delay}ms` }}
    >
      {children}
    </div>
  );
}

function WukongDivider({ glyph = '✦' }) {
  return (
    <div className="wukong-divider">
      <span className="wukong-divider-glyph">{glyph}</span>
    </div>
  );
}

/* ---- Nav ----------------------------------------------------- */
function Nav() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 56);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <nav
      className={`fixed top-0 left-0 right-0 z-50 transition-all duration-700 ${scrolled ? 'nav-scrolled' : ''}`}
      style={{ paddingTop: scrolled ? '1rem' : '2rem', paddingBottom: scrolled ? '1rem' : '2rem' }}
    >
      <div className="grid grid-cols-12 px-6">
        <div className="col-start-2 col-span-10 flex items-center justify-between">
          <a href="#" style={{ textDecoration: 'none' }}>
            <span style={{
              fontSize: '0.72rem', letterSpacing: '0.24em', textTransform: 'uppercase',
              color: 'rgba(255,255,255,0.62)', fontWeight: 300, transition: 'color 0.4s',
            }}
              onMouseEnter={e => e.currentTarget.style.color = 'rgba(255,255,255,0.9)'}
              onMouseLeave={e => e.currentTarget.style.color = 'rgba(255,255,255,0.62)'}
            >
              KiwiDesigns
            </span>
          </a>
          <div className="flex items-center gap-8">
            <a href="#about" className="nav-link">About</a>
            <a href="#work"  className="nav-link">Work</a>
            <a href="#work"  className="cta-btn" style={{ padding: '0.52rem 1.3rem', marginLeft: '0.5rem' }}>
              View Work
            </a>
          </div>
        </div>
      </div>
    </nav>
  );
}

/* ---- Hero ---------------------------------------------------- */

          - 20px above eyebrow → eyebrow: transitions from 80% to 100%
          - eyebrow → near bottom: 100% opaque glass
          - bottom edge: 50px soft fade out */}
      <div aria-hidden="true" style={{
        position: 'absolute',
        inset: 0,
        background: 'rgba(10,12,16,0.9)',
        backdropFilter: 'blur(18px)',
        WebkitBackdropFilter: 'blur(18px)',
        WebkitMaskImage: `linear-gradient(to bottom,
          rgba(0,0,0,0.8)  0px,
          rgba(0,0,0,0.8)  calc(38vh - 150px),
          rgba(0,0,0,0.83) calc(38vh - 120px),
          rgba(0,0,0,0.87) calc(38vh - 90px),
          rgba(0,0,0,0.91) calc(38vh - 55px),
          rgba(0,0,0,0.96) calc(38vh - 20px),
          black            calc(38vh),
          black            calc(100% - 50px),
          transparent      100%)`,
        maskImage: `linear-gradient(to bottom,
          rgba(0,0,0,0.8)  0px,
          rgba(0,0,0,0.8)  calc(38vh - 150px),
          rgba(0,0,0,0.83) calc(38vh - 120px),
          rgba(0,0,0,0.87) calc(38vh - 90px),
          rgba(0,0,0,0.91) calc(38vh - 55px),
          rgba(0,0,0,0.96) calc(38vh - 20px),
          black            calc(38vh),
          black            calc(100% - 50px),
          transparent      100%)`,
        zIndex: 1,
        pointerEvents: 'none',
      }} />

      {/* Video — absolute, 50vw wide, top half visible, stays on last frame */}
      <video
        className="hero2-video"
        src="images/Video.mp4"
        autoPlay
        muted
        playsInline
        onEnded={e => e.target.pause()}
        aria-hidden="true"
      />

      {/* Centered text content — paddingTop pushes it to the video fade zone */}
      <div className="hero2-content" style={{ paddingTop: '38vh' }}>

        <MistReveal delay={60}>
          <p className="eyebrow mb-6">Portfolio — 2024</p>
        </MistReveal>

        <MistReveal delay={160}>
          <h1 className="font-bold" style={{
            fontSize: 'clamp(3.2rem, 8vw, 7rem)',
            letterSpacing: '-0.055em',
            lineHeight: '0.93',
            marginBottom: '2rem',
            color: '#ffffff',
            textAlign: 'center',
          }}>
            Architecting
            <br />
            <span style={{ color: 'rgba(255,255,255,0.28)' }}>Digital</span>
            <br />
            Citadels

              onMouseLeave={e => e.currentTarget.style.color = 'rgba(255,255,255,0.38)'}

              About

          </div>
        </MistReveal>

      </div>
    </section>
  );
}

/* ---- Shine Card — runs shine once per hover, prevents re-run ---- */
function ShineCard({ children }) {
  const runningRef = React.useRef(false);
  const [shining, setShining] = React.useState(false);
  const handleEnter = () => {
    if (runningRef.current) return;
    runningRef.current = true;
    setShining(true);
    setTimeout(() => { setShining(false); runningRef.current = false; }, 1500);
  };
  return (
    <div className={`scroll-card${shining ? ' shine-active' : ''}`} onMouseEnter={handleEnter}>
      <div className="shine-overlay" />
      {children}
    </div>
  );
}

    setShining(true);
    setTimeout(() => { setShining(false); runningRef.current = false; }, 1500);

<script>
/* ── Calligraphy Brush Cursor Effect ── */
(function(){
  'use strict';
  const canvas = document.getElementById('fluid-canvas');
  const ctx = canvas.getContext('2d');
  if(!ctx) return;

  function syncSize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  syncSize();
  window.addEventListener('resize',syncSize);

  // Dark navy ink — darker-toned strokes on the dark background
  const PALETTE=[[18,32,100],[12,22,80],[22,38,115]];
  let palIdx=0, currentColor=PALETTE[0], idleTimer=null;

  const MAX_AGE=700; // ms trail lifetime
  const trail=[];   // {x,y,t,speed,color}
  let lx=0,ly=0,lt=0;

  document.addEventListener('mousemove',e=>{
    const now=performance.now();
    const dx=e.clientX-lx, dy=e.clientY-ly;
    const dt=Math.max(now-lt,1);
    const speed=Math.sqrt(dx*dx+dy*dy)/dt; // px/ms
    trail.push({x:e.clientX,y:e.clientY,t:now,speed,color:currentColor});
    lx=e.clientX;ly=e.clientY;lt=now;
    // Rotate palette color after a brief pause (new stroke)
    clearTimeout(idleTimer);
    idleTimer=setTimeout(()=>{
      palIdx=(palIdx+1)%PALETTE.length;
      currentColor=PALETTE[palIdx];
    },280);
  },{passive:true});

  function render(now){
    requestAnimationFrame(render);
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Drop expired points
    const cutoff=now-MAX_AGE;
    while(trail.length>1&&trail[0].t<cutoff) trail.shift();
    if(trail.length<2) return;

    for(let i=1;i<trail.length;i++){
      const a=trail[i-1], b=trail[i];
      const age=(now-b.t)/MAX_AGE;          // 0=fresh → 1=gone
      const alpha=Math.max(0,1-age)*0.25;
      if(alpha<0.01) continue;

      // Calligraphy ink: slow cursor = thick stroke, fast = thin
      // speed in px/ms: ~0.05 slow, ~0.4 medium, ~2+ fast
      const w=7.5+39/(1+b.speed*4);

      const [r,g,bv]=b.color;
      ctx.beginPath();
      ctx.moveTo(a.x,a.y);
      // Smooth through midpoint to next point if available
      if(i<trail.length-1){
        const c=trail[i+1];
        ctx.quadraticCurveTo(b.x,b.y,(b.x+c.x)/2,(b.y+c.y)/2);
      } else {
        ctx.lineTo(b.x,b.y);
      }
      ctx.strokeStyle=`rgba(${r},${g},${bv},${alpha})`;
      ctx.lineWidth=w;
      ctx.lineCap='round';
      ctx.lineJoin='round';
      ctx.stroke();
    }
  }
  requestAnimationFrame(render);
})();
</script>
