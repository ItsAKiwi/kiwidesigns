    .cta-btn {

      pointer-events: none;
      z-index: 0;

      -webkit-mask-image: linear-gradient(to bottom,
        black 0%, black 30%, rgba(0,0,0,0.6) 50%, transparent 68%);
      mask-image: linear-gradient(to bottom,
        black 0%, black 30%, rgba(0,0,0,0.6) 50%, transparent 68%);

const { useState, useEffect, useRef } = React;

/* ---- Intersection Observer ----------------------------------- */
function useFadeInView(threshold = 0.06) {
  const ref = useRef(null);
  const [isVisible, setIsVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const observer = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setIsVisible(true); observer.unobserve(entry.target); } },
      { threshold }
    );
    observer.observe(el);
    return () => observer.disconnect();
  }, []);
  return [ref, isVisible];
}

function MistReveal({ children, delay = 0, className = '' }) {
  const [ref, isVisible] = useFadeInView();
  return (
    <div
      ref={ref}
      className={`mist-reveal${isVisible ? ' in-view' : ''} ${className}`}
      style={{ transitionDelay: `${delay}ms` }}
    >
      {children}
    </div>
  );
}

function WukongDivider({ glyph = '✦' }) {

}

function Nav() {

    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <nav
      className={`fixed top-0 left-0 right-0 z-50 transition-all duration-700 ${scrolled ? 'nav-scrolled' : ''}`}
      style={{ paddingTop: scrolled ? '1rem' : '2rem', paddingBottom: scrolled ? '1rem' : '2rem' }}

        <div className="col-start-2 col-span-10 flex items-center justify-between">

              onMouseEnter={e => e.currentTarget.style.color = 'rgba(255,255,255,0.9)'}
              onMouseLeave={e => e.currentTarget.style.color = 'rgba(255,255,255,0.62)'}

  );
}

/* ---- Shine Card — runs shine once per hover, prevents re-run ---- */
function ShineCard({ children }) {
  const runningRef = React.useRef(false);
  const [shining, setShining] = React.useState(false);
  const handleEnter = () => {
    if (runningRef.current) return;
    runningRef.current = true;
    setShining(true);
    setTimeout(() => { setShining(false); runningRef.current = false; }, 1500);
  };
  return (
    <div className={`scroll-card${shining ? ' shine-active' : ''}`} onMouseEnter={handleEnter}>
      <div className="shine-overlay" />
      {children}
    </div>
  );
}
